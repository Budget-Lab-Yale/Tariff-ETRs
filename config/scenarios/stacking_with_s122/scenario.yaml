# Stacking Exercise 1: Policy layers WITH S122
#
# Each date is a cumulative layer — look at LEVELS output.
# Marginal impact = level[layer N] - level[layer N-1]
# Dates are arbitrary labels (not real policy dates).

baseline: '2025-01-01'

counterfactual:
  # Layer 0: Current law (2026-02-24) minus S122
  - date: '2026-03-01'
    historical: '2026-02-24'
    reform: '../2026-04-02/reforms/s122_disabled'

  # Layer 1: + S122
  - date: '2026-03-02'
    historical: '2026-02-24'

  # Layer 2: + best-guess pharma (S122 stays active)
  - date: '2026-03-03'
    historical: '2026-02-24'
    reform: '../2026-04-02/reforms/pharma_with_s122'

  # Layer 3: + metal overhaul (S122 stays active)
  - date: '2026-03-04'
    historical: '2026-02-24'
    reform: '../2026-04-02/reforms/pharma_metal_with_s122'

series_horizon: '2026-12-31'
