# 2-21_perm: Permanent tariffs scenario
#
# Models March 2025 tariff expansion with Section 122 active from Feb 24 onward.
# Baseline is pre-inauguration tariff policy.

baseline: '2025-01-01'

counterfactual:
  - '2026-01-01'                        # Post-inauguration, pre-reciprocal
  - date: '2026-02-20'                  # Reciprocal + S122 kicks in (permanent)
    reform: 'reforms/s122'

series_horizon: '2026-12-31'
