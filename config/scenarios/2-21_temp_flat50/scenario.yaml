# 2-21_temp_flat50: Temporary tariffs with flat 50% metal content
#
# Same as 2-21_temp but uses flat 50% metal content share instead of
# BEA detail-level per-metal-type shares.

baseline: '2025-01-01'

counterfactual:
  - date: '2026-01-01'
    reform: 'reforms/flat'              # Override metal content method only
  - date: '2026-02-20'
    reform: 'reforms/flat_with_s122'    # Flat metal content + Section 122
  - date: '2026-07-24'                  # S122 expires, flat metal content remains
    historical: '2026-02-20'
    reform: 'reforms/flat'

series_horizon: '2026-12-31'
